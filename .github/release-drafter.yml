name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "🧰 Maintenance"
    labels:
      - chore
      - refactor
      - ci
      - docs
      - test
      - perf

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
      - feature
  patch:
    labels:
      - patch
      - fix
      - chore
  default: patch

template: |
  ## Changes

  $CHANGES

autolabeler:
  - label: feature
    title:
      - '/^feat(\(.+\))?:/'
  - label: fix
    title:
      - '/^fix(\(.+\))?:/'
  - label: chore
    title:
      - '/^(chore|refactor|ci|docs|test|perf|build|style)(\(.+\))?:/'
